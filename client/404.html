<!DOCTYPE html>
<html lang="en">                                                                                                         
<head>
  <meta charset="UTF-8">                                                                                                 
  <title>Page Not Found</title>                           
  <script>
    var path = window.location.pathname;
    if (path.startsWith('/spending/')) {                                                                                 
      sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
      window.location.replace('/spending/');                                                                             
    }                                                                                                                    
  </script>
</head>                                                                                                                  
<body>                                                    
  <p>Page not found.</p>
</body>
</html>
